name: Build Desktop

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            artifact: macos
            runner: macos-latest
          - name: Windows
            artifact: windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify project
        run: npm run check

      - name: Build Tauri app
        run: npm run tauri:build -- --ci --no-sign

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kadaclaw-${{ matrix.platform.artifact }}-bundle
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: kadaclaw-macos-bundle
          path: release-assets/macos

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: kadaclaw-windows-bundle
          path: release-assets/windows

      - name: Pack release assets
        shell: bash
        run: |
          cd release-assets
          zip -r kadaclaw-macos-bundle.zip macos
          zip -r kadaclaw-windows-bundle.zip windows

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/kadaclaw-macos-bundle.zip
            release-assets/kadaclaw-windows-bundle.zip
          generate_release_notes: true

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDP 页面改写演示</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #fdfcf8;
        color: #1d2a24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 40px 20px;
      }

      .shell {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        gap: 24px;
      }

      .panel,
      .preview {
        border-radius: 24px;
        border: 1px solid rgba(23, 40, 33, 0.08);
        box-shadow: 0 20px 60px rgba(37, 52, 44, 0.08);
      }

      .panel {
        padding: 24px;
        background: rgba(255, 255, 255, 0.9);
      }

      .preview {
        padding: 28px;
        background: rgba(255, 255, 255, 0.88);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 123, 108, 0.08);
        color: #0f7b6c;
        font-size: 13px;
      }

      .title {
        margin-top: 14px;
        font-size: 28px;
        line-height: 1.2;
      }

      .copy {
        margin-top: 12px;
        color: #56625d;
        line-height: 1.7;
      }

      .field {
        margin-top: 20px;
      }

      .field label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .field input,
      .field textarea {
        width: 100%;
        border: 1px solid rgba(23, 40, 33, 0.14);
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
        background: #fffdfa;
      }

      .field textarea {
        min-height: 180px;
        resize: vertical;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: #0f7b6c;
        color: #f7f3ea;
      }

      .secondary {
        background: rgba(23, 40, 33, 0.08);
        color: #1d2a24;
      }

      .preview-card {
        margin-top: 24px;
        border-radius: 24px;
        padding: 28px;
        background: rgba(255, 251, 244, 0.92);
        border: 1px solid rgba(23, 40, 33, 0.08);
      }

      .preview-meta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(217, 138, 50, 0.12);
        color: #9b5b19;
        font-size: 13px;
      }

      .preview-title {
        margin-top: 18px;
        font-size: 32px;
        line-height: 1.2;
      }

      .preview-body {
        margin-top: 14px;
        white-space: pre-wrap;
        line-height: 1.8;
        color: #405049;
      }

      @media (max-width: 900px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="panel">
        <div class="eyebrow">CDP 改写演示</div>
        <h1 class="title">通过浏览器工具修改页面内容</h1>
        <p class="copy">
          这是一个给 skill 演示用的本地页面。你可以修改标题和正文，然后点击按钮，把结果同步到右侧预览卡片。
        </p>

        <div class="field">
          <label for="titleInput">公告标题</label>
          <input id="titleInput" value="春季活动节奏提醒" />
        </div>

        <div class="field">
          <label for="bodyInput">公告正文</label>
          <textarea id="bodyInput">本周重点关注首页转化、客服响应时长和库存预警，必要时提前调整投放预算。</textarea>
        </div>

        <div class="actions">
          <button id="applyButton" class="primary" type="button">更新预览</button>
          <button id="resetButton" class="secondary" type="button">恢复默认</button>
        </div>
      </section>

      <section class="preview">
        <div class="eyebrow">实时预览</div>
        <div class="preview-card">
          <div class="preview-meta">店铺运营公告</div>
          <h2 id="previewTitle" class="preview-title">春季活动节奏提醒</h2>
          <p id="previewBody" class="preview-body">本周重点关注首页转化、客服响应时长和库存预警，必要时提前调整投放预算。</p>
        </div>
      </section>
    </div>

    <script>
      const defaultTitle = "春季活动节奏提醒";
      const defaultBody = "本周重点关注首页转化、客服响应时长和库存预警，必要时提前调整投放预算。";

      const titleInput = document.getElementById("titleInput");
      const bodyInput = document.getElementById("bodyInput");
      const previewTitle = document.getElementById("previewTitle");
      const previewBody = document.getElementById("previewBody");
      const applyButton = document.getElementById("applyButton");
      const resetButton = document.getElementById("resetButton");

      const syncPreview = () => {
        previewTitle.textContent = titleInput.value.trim() || defaultTitle;
        previewBody.textContent = bodyInput.value.trim() || defaultBody;
      };

      applyButton.addEventListener("click", syncPreview);
      resetButton.addEventListener("click", () => {
        titleInput.value = defaultTitle;
        bodyInput.value = defaultBody;
        syncPreview();
      });
    </script>
  </body>
</html>
